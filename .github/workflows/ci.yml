name: CI

on:
  pull_request:
  push:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      - name: Package Obsidian plugin
        run: bun run --filter=obsidian-plugin package

      - name: Upload Obsidian plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: trawl-obsidian-plugin
          path: |
            apps/obsidian-plugin/dist/main.js
            apps/obsidian-plugin/dist/manifest.json
            apps/obsidian-plugin/dist/versions.json
            apps/obsidian-plugin/dist/trawl-obsidian-plugin.zip
          if-no-files-found: error
